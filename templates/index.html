<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Map</title>
    <script src="/js/map.js"></script>
  </head>
  <body>
    <div class="control-panel">
      <div class="panel-header">
        <span class="control-title">Camera Filters</span>
        <button id="toggleAdvancedButton" onclick="toggleAdvanced()" class="toggle-button">Hide</button>
      </div>

      <div id="advancedSection">
        <div class="stats-grid">
          <div class="stat-card"><strong>Fixed Cameras:</strong> <span id="fixedCount">0</span></div>
          <div class="stat-card"><strong>Mobile Enforcement:</strong> <span id="mobileCount">0</span></div>
          <div class="stat-card"><strong>Red Light Cameras:</strong> <span id="redLightCount">0</span></div>
        </div>

        <div class="filter-group">
          <label><input type="checkbox" value="Fixed Camera" checked onchange="applyFiltersAndSearch()" /> Fixed Camera</label>
          <label><input type="checkbox" value="Mobile Enforcement" checked onchange="applyFiltersAndSearch()" /> Mobile Enforcement</label>
          <label><input type="checkbox" value="Red Light Camera" checked onchange="applyFiltersAndSearch()" /> Red Light Camera</label>
        </div>

        <hr />

        <input type="text" id="searchInput" class="search-input" placeholder="Search by location, site ID, or speed..." onkeyup="handleSearchKey(event)" />

        <button onclick="applyFiltersAndSearch()" class="action-button">Search</button>

        <button onclick="resetSearch()" class="action-button">Reset</button>

        <p id="resultCount"></p>

        <div id="resultsList"></div>
      </div>
    </div>

    <div id="map"></div>

    <script>
      window.GOOGLE_MAPS_API_KEY = "{{ google_maps_api_key }}";
    </script>
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css" />
    <script async src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap"></script>
  </body>
</html>
